<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Menu</title>
  <link rel="stylesheet" href="menustyle.css">
</head>
<body>
    <header>
      <div class="header-left">
        <img src="assets/logo.png" alt="Logo" class="logo">
        <nav>
          <ul>
            <li><a href="#">Меню</a></li>
            <li><a href="#">Салбар</a></li>
            <li><a href="#">Бидний тухай</a></li>
          </ul>
        </nav>
      </div>

      <div class="header-right">
          <button class="cart-button">
              <img src="assets/cart.png" alt="ShoppingCart" class="cart-icon"> Сагс
          </button>
          <button class="login-button">
              <img src="assets/login.png" alt="Login" class="login-icon">Нэвтрэх
          </button>
      </div>
 </header>
 <section>
  <img src="assets\product-img1.png" alt="Home Image" class="homeimage"> 
 </section>

    <footer>
      <div>
        <h3>Тусламж үйлчилгээ</h3>
        <ul>
          <li><a href="#">Илчлэгийн мэдээлэл</a></li>
          <li><a href="#">Нийгмийн хариуцлага</a></li>
          <li><a href="#">Хүний нөөц</a></li>
        </ul>
      </div>
      <div>
        <h3>Бидэнтэй холбогдох</h3>
        <ul>
          <li><a href="https://www.facebook.com/KFC.Mongolia/">Facebook</a></li>
          <li><a href="https://www.instagram.com/kfc_mongolia/">Instagram</a></li>
          <li><a href="https://twitter.com/MongoliaKfc">Twitter</a></li>
        </ul>
      </div>
      <div id="comment">
        <h3>Санал хүсэлт</h3>
        <input type="text" placeholder="Утасны дугаар">
        <input type="text" placeholder="Санал хүсэлт">
        <button>Илгээх</button>
      </div>
   </footer>
</body>
</html>
